# Railway Configuration for DropIQ Platform
# This configuration defines all services for the DropIQ cryptocurrency airdrop platform

[build]
builder = "NIXPACKS"

# Frontend Service (Next.js)
[[services]]
name = "frontend"
source = "."
runtime = "nodejs"

[services.build]
buildCommand = "npm run build"
startCommand = "npm start"

[services.health_checks]
path = "/api/health"
port = 3000
interval = 30
timeout = 10
retries = 3

[services.env]
NODE_ENV = "production"
PORT = "3000"

# Backend Service (Node.js/Express API)
[[services]]
name = "backend"
source = "."
runtime = "nodejs"

[services.build]
buildCommand = "npm run build:backend"
startCommand = "npm run start:backend"

[services.deploy]
# Run post-deployment script for database setup
postdeployCommand = "bash scripts/railway-deploy.sh"

[services.health_checks]
path = "/api/health"
port = 8000
interval = 30
timeout = 10
retries = 3

[services.env]
NODE_ENV = "production"
PORT = "8000"

# Database Service (PostgreSQL Plugin)
[[services]]
name = "database"
runtime = "postgresql"

[services.env]
POSTGRES_USER = "dropiq"
POSTGRES_PASSWORD = "${RAILWAY_ENVIRONMENT.POSTGRES_PASSWORD}"
POSTGRES_DB = "dropiq_prod"

# Redis Service (Redis Plugin)
[[services]]
name = "redis"
runtime = "redis"

[services.env]
REDIS_PASSWORD = "${RAILWAY_ENVIRONMENT.REDIS_PASSWORD}"

# Global Environment Variables
[global.env]
NEXT_PUBLIC_APP_NAME = "DropIQ"
NEXT_PUBLIC_APP_DESCRIPTION = "Cryptocurrency Airdrop Platform"
NEXT_PUBLIC_APP_VERSION = "1.0.0"

# Production Environment Variables
[global.env.production]
DATABASE_URL = "${{database.DATABASE_URL}}"
REDIS_URL = "${{redis.REDIS_URL}}"
JWT_SECRET = "${RAILWAY_ENVIRONMENT.JWT_SECRET}"
NEXTAUTH_SECRET = "${RAILWAY_ENVIRONMENT.NEXTAUTH_SECRET}"
NEXTAUTH_URL = "${{frontend.RAILWAY_PUBLIC_DOMAIN}}"
SENTRY_DSN = "${RAILWAY_ENVIRONMENT.SENTRY_DSN}"
NEXT_PUBLIC_WALLET_CONNECT_ID = "${RAILWAY_ENVIRONMENT.NEXT_PUBLIC_WALLET_CONNECT_ID}"
NEXT_PUBLIC_SOLANA_NETWORK = "mainnet-beta"

# Preview Environment Variables (for Pull Requests)
[global.env.preview]
DATABASE_URL = "${{database.DATABASE_URL}}"
REDIS_URL = "${{redis.REDIS_URL}}"
JWT_SECRET = "${RAILWAY_ENVIRONMENT.JWT_SECRET_PREVIEW}"
NEXTAUTH_SECRET = "${RAILWAY_ENVIRONMENT.NEXTAUTH_SECRET_PREVIEW}"
NEXTAUTH_URL = "${{frontend.RAILWAY_PUBLIC_DOMAIN}}"
SENTRY_DSN = "${RAILWAY_ENVIRONMENT.SENTRY_DSN_PREVIEW}"
NEXT_PUBLIC_WALLET_CONNECT_ID = "${RAILWAY_ENVIRONMENT.NEXT_PUBLIC_WALLET_CONNECT_ID}"
NEXT_PUBLIC_SOLANA_NETWORK = "devnet"

# Deployment Configuration
[deploy]
# Enable preview deployments for pull requests
preview = true

# Auto-cancel previous deployments on new commits
autoCancel = true

# Health check timeout
healthcheckTimeout = "300s"

# Rollback configuration
[deploy.rollback]
# Auto-rollback on deployment failure
autoRollback = true
# Health check threshold before considering deployment successful
healthCheckThreshold = 3

# Scaling Configuration
[scale]
# Minimum and maximum instances for each service
minInstances = 1
maxInstances = 10

# Auto-scaling based on CPU and memory
[scale.autoScaling]
enabled = true
cpuThreshold = 70
memoryThreshold = 80
scaleUpCooldown = "5m"
scaleDownCooldown = "10m"