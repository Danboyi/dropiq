name: Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC every day
  workflow_dispatch:

jobs:
  comprehensive-tests:
    name: Comprehensive Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16, 18, 20]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          npm run db:generate
          npm run db:push

      - name: Run full test suite
        run: npm run test:ci

      - name: Run comprehensive E2E tests
        run: npx playwright test --project=chromium --project=firefox --project=webkit

      - name: Run stress tests
        run: |
          npm install -g artillery
          artillery run tests/performance/stress-test.yml

      - name: Run security audit
        run: npm audit --audit-level=low

      - name: Check bundle size
        run: |
          npm run build
          npx bundlesize

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: nightly-test-results-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/
            playwright-report/
          retention-days: 7

  cross-browser-tests:
    name: Cross Browser Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run cross-browser tests
        run: npx playwright test --project=chromium --project=firefox --project=webkit

      - name: Upload browser test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: cross-browser-results
          path: playwright-report/
          retention-days: 7

  performance-regression:
    name: Performance Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          npm run db:generate
          npm run db:push

      - name: Build application
        run: npm run build

      - name: Start application
        run: npm start &
        sleep: 10

      - name: Run performance benchmarks
        run: node tests/performance/benchmark.js

      - name: Run load tests
        run: |
          npm run test:performance
          CONCURRENT_USERS=20 DURATION=60

      - name: Compare with baseline
        run: |
          echo "Comparing performance with baseline..."
          # Add performance comparison logic here

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-regression-results
          path: test-results/
          retention-days: 7

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install accessibility tools
        run: |
          npm install -g @axe-core/cli
          npm install -g pa11y-ci

      - name: Build application
        run: npm run build

      - name: Start application
        run: npm start &
        sleep: 10

      - name: Run accessibility tests
        run: |
          axe http://localhost:3000
          pa11y-ci http://localhost:3000

      - name: Upload accessibility results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: accessibility-results
          path: accessibility-results/
          retention-days: 7

  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [comprehensive-tests, cross-browser-tests, performance-regression, accessibility-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate nightly report
        run: |
          echo "# Nightly Test Report - $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Comprehensive Tests: ${{ needs.comprehensive-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cross Browser Tests: ${{ needs.cross-browser-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Performance Regression: ${{ needs.performance-regression.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility Tests: ${{ needs.accessibility-tests.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#alerts'
          text: 'Nightly tests failed! Please check the GitHub Actions for details.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}